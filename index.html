<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SilentStats - 专注力监控器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body {
            font-family: 'JetBrains+Mono', monospace;
            background-color: #0a0a0a;
            color: #e5e5e5;
        }
        .timer-glow {
            text-shadow: 0 0 20px rgba(34, 197, 94, 0.5);
        }
        /* 时间轴 24 小时格子 */
        .timeline-bar {
            position: relative;
            height: 32px;
            background: #1c1c1c;
            border-radius: 6px;
            overflow: hidden;
        }
        .timeline-segment {
            position: absolute;
            top: 0;
            height: 100%;
            background: #22c55e;
            border-radius: 3px;
            opacity: 0.85;
        }
        .timeline-segment.active {
            background: #4ade80;
            opacity: 1;
            animation: pulse-bar 2s infinite;
        }
        @keyframes pulse-bar {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <!-- 顶部状态栏 -->
    <div class="fixed top-0 w-full p-6 flex justify-between items-center bg-zinc-900/50 backdrop-blur-md border-b border-zinc-800">
        <h1 class="font-bold text-xl tracking-tighter">SILENT<span class="text-green-500">STATS</span></h1>
        <div class="text-sm text-zinc-400 text-right">
            今日专注: <span id="total-accumulated">0</span>
        </div>
    </div>

    <!-- 主交互区 -->
    <main class="w-full max-w-md text-center space-y-8">

        <div id="status-tag" class="inline-block px-3 py-1 rounded-full bg-zinc-800 text-xs font-bold uppercase tracking-widest text-zinc-500">
            等待开始
        </div>

        <!-- 计时器 -->
        <div class="py-12">
            <div id="main-timer" class="text-7xl font-bold timer-glow transition-all duration-500">00:00:00</div>
            <p class="text-zinc-500 mt-4 text-sm px-8">点击开始后，请锁屏或切换到其他 App。回到页面后自动结算。</p>
        </div>

        <!-- 操作按钮 -->
        <div class="flex flex-col gap-4">
            <button id="start-btn" class="w-full py-4 bg-green-600 hover:bg-green-500 text-black font-bold rounded-xl transition-all transform active:scale-95 shadow-lg">
                开始挑战 (START)
            </button>
            <button id="stop-btn" class="hidden w-full py-4 bg-zinc-800 hover:bg-zinc-700 text-white font-bold rounded-xl transition-all">
                结束专注
            </button>
        </div>

        <!-- 本次结算结果 -->
        <div id="result-area" class="hidden mt-4 p-6 border border-zinc-700 rounded-2xl bg-zinc-900/30 text-left space-y-4">
            <div>
                <p class="text-xs text-zinc-500 mb-1">本次总时长</p>
                <p id="result-total" class="text-3xl font-bold text-green-400">0 秒</p>
            </div>
            <div>
                <p class="text-xs text-zinc-500 mb-1">其中被打断时长</p>
                <p id="result-interrupted" class="text-xl font-bold text-yellow-400">0 秒</p>
            </div>
            <div>
                <p class="text-xs text-zinc-500 mb-1">纯净专注时长</p>
                <p id="result-clean" class="text-xl font-bold text-green-300">0 秒</p>
            </div>
        </div>

        <!-- 今日时间轴 -->
        <div class="mt-4 p-6 border border-zinc-800 rounded-2xl bg-zinc-900/30 text-left">
            <p class="text-xs text-zinc-500 mb-3 font-bold uppercase tracking-widest">今日时间轴</p>
            <!-- 时间刻度 -->
            <div class="flex justify-between text-[10px] text-zinc-600 mb-1 px-0">
                <span>0</span>
                <span>6</span>
                <span>12</span>
                <span>18</span>
                <span>24</span>
            </div>
            <div class="timeline-bar" id="timeline-bar"></div>
            <!-- 图例 -->
            <div id="session-list" class="mt-4 space-y-1"></div>
        </div>
    </main>

    <audio id="silent-audio" loop></audio>

    <script>
        const audio = document.getElementById('silent-audio');
        audio.src = 'p1.mp3';

        // 今日专注：每天清零
        function getTodayKey() {
            return 'silentStats_' + new Date().toISOString().slice(0, 10);
        }
        const todayKey = getTodayKey();
        const sessionsKey = todayKey + '_sessions';
        let todaySeconds = parseInt(localStorage.getItem(todayKey)) || 0;
        // sessions: [{start: timestamp, end: timestamp|null}]
        let sessions = JSON.parse(localStorage.getItem(sessionsKey) || '[]');

        // 状态
        let isRunning = false;
        let sessionStartTime = 0;
        let lastActiveTime = 0;
        let interruptedMs = 0;
        let interruptStartTime = 0;
        let isInterrupted = false;

        const timerDisplay = document.getElementById('main-timer');
        const startBtn = document.getElementById('start-btn');
        const stopBtn = document.getElementById('stop-btn');
        const statusTag = document.getElementById('status-tag');
        const totalDisplay = document.getElementById('total-accumulated');
        const resultArea = document.getElementById('result-area');

        totalDisplay.innerText = formatSec(todaySeconds);

        // 申请通知权限
        if ('Notification' in window && Notification.permission === 'default') {
            Notification.requestPermission();
        }

        function sendNotification(title, body) {
            if ('Notification' in window && Notification.permission === 'granted') {
                new Notification(title, { body, icon: '' });
            }
        }

        // 每秒更新今日专注（只在无声时累加）
        function tickTodayCounter() {
            if (isRunning && !isInterrupted) {
                todaySeconds += 1;
                localStorage.setItem(todayKey, todaySeconds);
                totalDisplay.innerText = formatSec(todaySeconds);
            }
            setTimeout(tickTodayCounter, 1000);
        }
        tickTodayCounter();

        // 音频被抢占 → 记录打断开始
        audio.onpause = () => {
            if (!isRunning) return;
            if (!isInterrupted) {
                isInterrupted = true;
                interruptStartTime = Date.now();
                statusTag.innerText = "检测到干扰";
                statusTag.className = "inline-block px-3 py-1 rounded-full bg-zinc-800 text-xs font-bold uppercase tracking-widest text-yellow-400 animate-pulse";
                sendNotification('⚠️ 检测到干扰', '你的专注被打断了，回来后点开始继续。');
            }
        };

        document.addEventListener('visibilitychange', () => {
            if (!isRunning) return;
            if (document.visibilityState === 'hidden') {
                if (isInterrupted) {
                    interruptedMs += Date.now() - interruptStartTime;
                    isInterrupted = false;
                }
                lastActiveTime = Date.now();
            } else {
                if (isInterrupted) {
                    isInterrupted = false;
                    interruptedMs += Date.now() - interruptStartTime;
                    isRunning = false;
                    audio.pause();
                    // 结束当前 session
                    endCurrentSession();
                    statusTag.innerText = "已暂停";
                    statusTag.className = "inline-block px-3 py-1 rounded-full bg-zinc-800 text-xs font-bold uppercase tracking-widest text-yellow-400";
                    startBtn.classList.remove('hidden');
                    stopBtn.classList.add('hidden');
                } else {
                    lastActiveTime = Date.now();
                    updateUI();
                    audio.play().catch(() => {});
                }
            }
        });

        function startChallenge() {
            const isResume = sessionStartTime > 0 && !isRunning;
            isRunning = true;
            isInterrupted = false;
            if (!isResume) {
                interruptedMs = 0;
                interruptStartTime = 0;
                sessionStartTime = Date.now();
                resultArea.classList.add('hidden');
            }
            lastActiveTime = Date.now();

            // 新建一段 session 前，先关闭所有未结束的
            sessions.forEach(s => { if (s.end === null) s.end = Date.now(); });
            sessions.push({ start: Date.now(), end: null });
            saveSessions();
            renderTimeline();

            audio.play().catch(e => console.error("Audio play blocked", e));

            startBtn.classList.add('hidden');
            stopBtn.classList.remove('hidden');
            statusTag.innerText = "静默探测中";
            statusTag.className = "inline-block px-3 py-1 rounded-full bg-zinc-800 text-xs font-bold uppercase tracking-widest text-green-500 animate-pulse";

            tick();
        }

        function endCurrentSession() {
            // 找最后一个未结束的 session 结束它
            for (let i = sessions.length - 1; i >= 0; i--) {
                if (sessions[i].end === null) {
                    sessions[i].end = Date.now();
                    break;
                }
            }
            saveSessions();
            renderTimeline();
        }

        function settle() {
            if (!isRunning) return;
            isRunning = false;
            audio.pause();

            if (isInterrupted) {
                interruptedMs += Date.now() - interruptStartTime;
                isInterrupted = false;
            }

            endCurrentSession();

            const totalMs = Date.now() - sessionStartTime;
            const totalSec = Math.floor(totalMs / 1000);
            const interruptSec = Math.floor(interruptedMs / 1000);
            const cleanSec = Math.max(0, totalSec - interruptSec);

            document.getElementById('result-total').innerText = formatSec(totalSec);
            document.getElementById('result-interrupted').innerText = formatSec(interruptSec);
            document.getElementById('result-clean').innerText = formatSec(cleanSec);
            resultArea.classList.remove('hidden');

            resetUI();
        }

        function resetUI() {
            sessionStartTime = 0;
            startBtn.classList.remove('hidden');
            stopBtn.classList.add('hidden');
            statusTag.innerText = "等待开始";
            statusTag.className = "inline-block px-3 py-1 rounded-full bg-zinc-800 text-xs font-bold uppercase tracking-widest text-zinc-500";
            timerDisplay.innerText = "00:00:00";
        }

        function updateUI() {
            const elapsed = Math.floor((Date.now() - sessionStartTime) / 1000);
            const h = Math.floor(elapsed / 3600).toString().padStart(2, '0');
            const m = Math.floor((elapsed % 3600) / 60).toString().padStart(2, '0');
            const s = (elapsed % 60).toString().padStart(2, '0');
            timerDisplay.innerText = `${h}:${m}:${s}`;
            // 实时更新最后一段 session 的宽度
            renderTimeline();
        }

        function tick() {
            if (!isRunning) return;
            updateUI();
            setTimeout(tick, 1000);
        }

        function saveSessions() {
            localStorage.setItem(sessionsKey, JSON.stringify(sessions));
        }

        // 渲染时间轴
        function renderTimeline() {
            const bar = document.getElementById('timeline-bar');
            const list = document.getElementById('session-list');
            const dayStart = new Date();
            dayStart.setHours(0, 0, 0, 0);
            const dayMs = 24 * 60 * 60 * 1000;

            bar.innerHTML = '';
            list.innerHTML = '';

            sessions.forEach((s, i) => {
                const start = s.start;
                const end = s.end || Date.now();

                const leftPct = ((start - dayStart.getTime()) / dayMs) * 100;
                const widthPct = ((end - start) / dayMs) * 100;

                const seg = document.createElement('div');
                seg.className = 'timeline-segment' + (s.end === null ? ' active' : '');
                seg.style.left = leftPct + '%';
                seg.style.width = Math.max(widthPct, 0.3) + '%';
                seg.title = formatTime(start) + ' – ' + (s.end ? formatTime(end) : '进行中');
                bar.appendChild(seg);

                // 列表
                const item = document.createElement('div');
                item.className = 'flex items-center gap-2 text-xs text-zinc-400';

                const dot = document.createElement('span');
                dot.className = `w-2 h-2 rounded-full flex-shrink-0 ${s.end === null ? 'bg-green-400 animate-pulse' : 'bg-green-600'}`;

                const timeSpan = document.createElement('span');
                const endLabel = s.end ? formatTime(end) : '进行中';
                timeSpan.textContent = `${formatTime(start)} → ${endLabel}`;
                if (!s.end) timeSpan.querySelector && (timeSpan.style.color = '');

                const durSpan = document.createElement('span');
                durSpan.className = 'text-zinc-600 ml-auto';
                durSpan.textContent = formatSec(Math.floor((end - start) / 1000));

                item.appendChild(dot);
                item.appendChild(timeSpan);
                item.appendChild(durSpan);
                list.appendChild(item);
            });
        }

        function formatTime(ts) {
            const d = new Date(ts);
            return d.getHours().toString().padStart(2, '0') + ':' +
                   d.getMinutes().toString().padStart(2, '0');
        }

        function formatSec(sec) {
            const h = Math.floor(sec / 3600);
            const m = Math.floor((sec % 3600) / 60);
            const s = sec % 60;
            let str = '';
            if (h > 0) str += `${h} 小时 `;
            if (m > 0) str += `${m} 分钟 `;
            str += `${s} 秒`;
            return str;
        }

        // 初始渲染
        renderTimeline();

        startBtn.onclick = startChallenge;
        stopBtn.onclick = settle;
    </script>
</body>
</html>
