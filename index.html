<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SilentStats - 专注力监控器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body {
            font-family: 'JetBrains+Mono', monospace;
            background-color: #0a0a0a;
            color: #e5e5e5;
        }
        .timer-glow {
            text-shadow: 0 0 20px rgba(34, 197, 94, 0.5);
        }
        .violation-glow {
            text-shadow: 0 0 20px rgba(239, 68, 68, 0.5);
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <!-- 顶部状态栏 -->
    <div class="fixed top-0 w-full p-6 flex justify-between items-center bg-zinc-900/50 backdrop-blur-md border-b border-zinc-800">
        <h1 class="font-bold text-xl tracking-tighter">SILENT<span class="text-green-500">STATS</span></h1>
        <div id="lifetime-stats" class="text-sm text-zinc-400 text-right">
            历史总计: <span id="total-accumulated">0</span> 分钟
        </div>
    </div>

    <!-- 主交互区 -->
    <main class="w-full max-w-md text-center space-y-8">
        
        <div id="status-tag" class="inline-block px-3 py-1 rounded-full bg-zinc-800 text-xs font-bold uppercase tracking-widest text-zinc-500">
            等待开始
        </div>

        <!-- 计时器 -->
        <div class="py-12">
            <div id="main-timer" class="text-7xl font-bold timer-glow transition-all duration-500">00:00:00</div>
            <p id="sub-status" class="text-zinc-500 mt-4 text-sm px-8">点击开始后，请锁屏或切换到其他非娱乐 App。如果打开抖音/音乐，计时将停止并扣分。</p>
        </div>

        <!-- 操作按钮 -->
        <div class="flex flex-col gap-4">
            <button id="start-btn" class="w-full py-4 bg-green-600 hover:bg-green-500 text-black font-bold rounded-xl transition-all transform active:scale-95 shadow-lg">
                开始挑战 (START)
            </button>
            <button id="stop-btn" class="hidden w-full py-4 bg-zinc-800 hover:bg-zinc-700 text-white font-bold rounded-xl transition-all">
                结束并结算
            </button>
        </div>

        <!-- Levelsio 变现原型：自律对赌 -->
        <div id="bet-area" class="mt-12 p-6 border border-zinc-800 rounded-2xl bg-zinc-900/30">
            <div class="flex items-center justify-between mb-4">
                <span class="text-sm font-bold">自律押注 (MVP Preview)</span>
                <span class="text-xs bg-yellow-500/20 text-yellow-500 px-2 py-0.5 rounded">BETA</span>
            </div>
            <div class="grid grid-cols-3 gap-2">
                <button class="py-2 text-sm bg-zinc-800 rounded-lg hover:border-green-500 border border-transparent">$1</button>
                <button class="py-2 text-sm bg-zinc-800 rounded-lg hover:border-green-500 border border-transparent">$5</button>
                <button class="py-2 text-sm bg-zinc-800 rounded-lg hover:border-green-500 border border-transparent">$10</button>
            </div>
            <p class="text-[10px] text-zinc-600 mt-4 text-left">如果你在挑战期间打开了娱乐 App，押注将被没收。这是最有效的驱动力。</p>
        </div>
    </main>

    <!-- 违规警告 Modal -->
    <div id="modal-violation" class="fixed inset-0 bg-black/90 flex items-center justify-center p-6 z-50 hidden">
        <div class="bg-zinc-900 border border-red-500 p-8 rounded-2xl max-w-sm w-full text-center">
            <h2 class="text-2xl font-bold text-red-500 mb-4">抓到你了！</h2>
            <p class="text-zinc-400 mb-6 text-sm">系统检测到你刚才切换到了其他音频应用（抖音、B站、音乐等）。本次挑战无效。</p>
            <button onclick="closeModal()" class="w-full py-3 bg-red-500 text-white font-bold rounded-xl">我认罪，重新开始</button>
        </div>
    </div>

    <!-- 隐藏的音频元素 -->
    <!-- 使用极短的无声 WAV Base64 -->
    <audio id="silent-audio" loop>
        <source src="data:audio/wav;base64,UklGRigAAABXQVZFZm10IBIAAAABAAEARKwAAIhYAQACABAAAABkYXRhAgAAAAEA" type="audio/wav">
    </audio>

    <script>
        // 1. 状态定义
        let isRunning = false;
        let startTime = 0; // 本次开始的时间戳
        let lastActiveTime = 0; // 上次页面活跃的时间戳
        let accumulatedSeconds = 0; // 本次挑战已累计的秒数
        let lifetimeMinutes = parseFloat(localStorage.getItem('silentStats_total')) || 0;
        let violationDetected = false;

        const timerDisplay = document.getElementById('main-timer');
        const startBtn = document.getElementById('start-btn');
        const stopBtn = document.getElementById('stop-btn');
        const statusTag = document.getElementById('status-tag');
        const silentAudio = document.getElementById('silent-audio');
        const totalDisplay = document.getElementById('total-accumulated');

        totalDisplay.innerText = Math.floor(lifetimeMinutes);

        // 2. 核心检测逻辑：音频焦点丢失
        silentAudio.onpause = () => {
            if (isRunning && !violationDetected) {
                // 如果音频在运行中被暂停，且不是用户主动点的，那就是被抢占了
                console.log("Audio focus lost! Violation detected.");
                handleViolation();
            }
        };

        // 3. 核心补全逻辑：锁屏追溯
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible' && isRunning) {
                if (violationDetected) {
                    showViolationModal();
                } else {
                    const now = Date.now();
                    const gapSeconds = Math.floor((now - lastActiveTime) / 1000);
                    if (gapSeconds > 0) {
                        accumulatedSeconds += gapSeconds;
                    }
                    lastActiveTime = now;
                    updateUI();
                }
            }
        });

        // 4. 操作函数
        function startChallenge() {
            isRunning = true;
            violationDetected = false;
            startTime = Date.now();
            lastActiveTime = startTime;
            accumulatedSeconds = 0;

            // 必须由用户点击触发播放
            silentAudio.play().catch(e => console.error("Audio play blocked", e));

            startBtn.classList.add('hidden');
            stopBtn.classList.remove('hidden');
            statusTag.innerText = "静默探测中";
            statusTag.classList.add('text-green-500', 'animate-pulse');
            
            tick();
        }

        function stopChallenge() {
            if (!isRunning) return;
            
            isRunning = false;
            silentAudio.pause();
            
            // 结算分数
            const gainedMinutes = accumulatedSeconds / 60;
            lifetimeMinutes += gainedMinutes;
            localStorage.setItem('silentStats_total', lifetimeMinutes);
            totalDisplay.innerText = Math.floor(lifetimeMinutes);

            resetUI();
            alert(`结算成功！你刚才静默了 ${Math.floor(accumulatedSeconds)} 秒`);
        }

        function handleViolation() {
            violationDetected = true;
            // 立即停止音频，防止多次触发
            silentAudio.pause();
        }

        function showViolationModal() {
            document.getElementById('modal-violation').classList.remove('hidden');
            isRunning = false;
            resetUI();
        }

        function closeModal() {
            document.getElementById('modal-violation').classList.add('hidden');
            violationDetected = false;
        }

        function resetUI() {
            startBtn.classList.remove('hidden');
            stopBtn.classList.add('hidden');
            statusTag.innerText = "等待开始";
            statusTag.classList.remove('text-green-500', 'animate-pulse');
            timerDisplay.innerText = "00:00:00";
            timerDisplay.classList.remove('text-red-500');
        }

        function updateUI() {
            const h = Math.floor(accumulatedSeconds / 3600).toString().padStart(2, '0');
            const m = Math.floor((accumulatedSeconds % 3600) / 60).toString().padStart(2, '0');
            const s = (accumulatedSeconds % 60).toString().padStart(2, '0');
            timerDisplay.innerText = `${h}:${m}:${s}`;
        }

        function tick() {
            if (!isRunning || violationDetected) return;
            
            const now = Date.now();
            // 每秒增加一点
            accumulatedSeconds += 1;
            lastActiveTime = now;
            
            updateUI();
            setTimeout(tick, 1000);
        }

        // 5. 事件绑定
        startBtn.onclick = startChallenge;
        stopBtn.onclick = stopChallenge;

    </script>
</body>
</html>
