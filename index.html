<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silent Time | 远离干扰的纯净时间</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@700&display=swap');
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        .timer-font {
            font-family: 'JetBrains Mono', monospace;
        }

        .timer-glow {
            transition: all 0.3s ease;
        }
        .is-focusing .timer-glow {
            text-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
        }

        @keyframes shine-reverse {
            0% { background-position: 200% center; }
            100% { background-position: -200% center; }
        }

        .progress-shimmer {
            background: linear-gradient(
                -90deg, 
                #3b82f6 0%, 
                #93c5fd 50%, 
                #3b82f6 100%
            );
            background-size: 200% auto;
            animation: shine-reverse 2.5s linear infinite;
        }

        .timeline-block {
            position: absolute;
            height: 100%;
            background: #3b82f6;
            opacity: 0.7;
            border-radius: 2px;
        }

        /* 移除 transition，防止满一分钟时产生回退动画 */
        #micro-progress {
            transition: none; 
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen flex flex-col items-center p-6">

    <div class="w-full max-w-md flex-1 flex flex-col">
        <!-- Header -->
        <header class="text-center mt-8 mb-10">
            <div class="flex items-center justify-center gap-2 mb-2">
                <img src="favicon.png" class="w-12 h-12" alt="logo">
                <h1 class="text-3xl font-extrabold tracking-tight">Silent Time</h1>
            </div>
            <p class="text-gray-500 text-sm">保护你的安静时间</p>
        </header>

        <!-- Main Timer Card -->
        <main class="bg-white rounded-3xl shadow-xl shadow-gray-200/50 p-8 mb-8 text-center border border-gray-100 flex-1 flex flex-col justify-center relative">
            
            <div id="status-tag" class="inline-block px-3 py-1 rounded-full text-xs font-semibold bg-gray-100 text-gray-500 mb-8 uppercase tracking-widest transition-all">
                准备就绪
            </div>

            <!-- 今日累计 — 主视觉 -->
            <div class="mb-8">
                <p class="text-[10px] font-semibold text-gray-400 uppercase tracking-widest mb-2">今日累计</p>
                <div id="total-time" class="text-6xl font-extrabold timer-font tracking-tighter text-gray-900">0 秒</div>
            </div>

            <!-- 分割线 -->
            <div class="w-full border-t border-gray-100 mb-6"></div>

            <!-- 当前专注 -->
            <div class="mb-6">
                <p class="text-[10px] font-semibold text-gray-300 uppercase tracking-widest mb-2">当前专注</p>
                <!-- 独立进度条 -->
                <div id="progress-wrapper" class="w-full mb-3 opacity-0 transition-opacity duration-500">
                    <div class="h-1.5 w-full bg-gray-100 rounded-full overflow-hidden">
                        <div id="micro-progress" class="h-full w-0 rounded-full progress-shimmer"></div>
                    </div>
                </div>
                <!-- 计时器 -->
                <div id="timer-display" class="text-2xl font-bold tabular-nums tracking-tighter timer-font timer-glow text-gray-400">
                    00:00:00<span class="text-base text-gray-300">.000</span>
                </div>
            </div>

            <div class="space-y-4">
                <button id="main-btn" class="w-full py-5 rounded-2xl bg-black text-white font-bold text-xl shadow-lg active:scale-95 transition-transform">
                    开始专注
                </button>
                <p id="hint-text" class="text-xs text-gray-400 h-4">
                    点击后将播放静音白噪音以感知干扰
                </p>
                <div class="flex items-center justify-center gap-3 h-4 mt-2">
                    <p id="now-playing" class="text-[10px] text-gray-300 tracking-wide"></p>
                    <button id="next-track-btn" class="hidden text-[10px] text-gray-300 hover:text-blue-400 active:scale-95 transition-all">⏭ 下一首</button>
                </div>
            </div>
        </main>

        <!-- Stats Section -->
        <section class="bg-white rounded-3xl p-6 shadow-sm border border-gray-100 mb-6">
            <div class="flex justify-between items-end mb-4">
                <div></div>
                <div class="text-right">
                    <button id="share-btn" class="text-blue-500 text-xs font-semibold">分享成就 ↗</button>
                </div>
            </div>

            <div class="relative w-full h-4 bg-gray-100 rounded-full overflow-hidden mb-2" id="timeline-container"></div>
            <div class="flex justify-between text-[10px] text-gray-400 px-1 mb-6">
                <span>00:00</span>
                <span>12:00</span>
                <span>24:00</span>
            </div>

            <!-- 历史列表 -->
            <div class="space-y-3">
                <h4 class="text-[10px] font-bold text-gray-300 uppercase tracking-widest">专注历史</h4>
                <div id="session-list" class="max-h-48 overflow-y-auto space-y-2 pr-1">
                    <p class="text-xs text-gray-400 text-center py-4">今天还没有记录</p>
                </div>
            </div>
        </section>

        <!-- Footer -->
        <footer class="text-center pb-8 mt-auto">
            <p class="text-[10px] text-gray-300 uppercase tracking-widest font-medium">
                Pure Static • Precision Mode
            </p>
        </footer>
    </div>

    <!-- 分享弹窗 -->
    <div id="share-modal" class="fixed inset-0 z-50 flex items-center justify-center hidden">
        <!-- 遮罩 -->
        <div id="share-overlay" class="absolute inset-0 bg-black/40 backdrop-blur-sm"></div>
        <!-- 弹窗内容 -->
        <div class="relative bg-white rounded-3xl shadow-2xl pt-8 pb-6 px-8 w-[90%] max-w-sm mx-auto z-10">
            <!-- 关闭按钮 -->
            <button id="share-close" class="absolute top-4 right-4 text-gray-300 hover:text-gray-500 text-2xl leading-none">&times;</button>

            <!-- Logo 品牌区 -->
            <div class="flex items-center justify-center gap-2 mb-5">
                <img src="favicon.png" class="w-9 h-9 opacity-80" alt="logo">
                <span class="text-xl font-extrabold tracking-tight text-gray-500">Silent Time</span>
            </div>

            <!-- 顶部：日期 + 专注时间大字 -->
            <div class="text-center mb-6">
                <p id="share-date-label" class="text-[10px] text-gray-400 uppercase tracking-widest mb-4"></p>
                <p id="share-focus-time" class="text-5xl font-extrabold timer-font text-blue-500 leading-none">—</p>
                <p class="text-[10px] font-semibold text-gray-400 uppercase tracking-widest mt-2">安静时间</p>
            </div>

            <!-- 有声时间 — 小字配角 -->
            <div class="text-center mb-6">
                <p id="share-noise-time" class="text-base font-bold timer-font text-orange-300 leading-none">—</p>
                <p class="text-[9px] font-semibold text-gray-300 uppercase tracking-widest mb-1">有声时间</p>
            </div>

            <!-- 饼状图 -->
            <div class="flex flex-col items-center mb-4">
                <canvas id="share-pie" width="180" height="180"></canvas>
                <div class="flex gap-6 mt-3">
                    <div class="flex items-center gap-1.5">
                        <span class="w-2.5 h-2.5 rounded-full bg-blue-500 inline-block"></span>
                        <span class="text-[11px] text-gray-500">安静</span>
                    </div>
                    <div class="flex items-center gap-1.5">
                        <span class="w-2.5 h-2.5 rounded-full bg-orange-300 inline-block"></span>
                        <span class="text-[11px] text-gray-400">有声</span>
                    </div>
                </div>
            </div>

            <!-- 统计范围 -->
            <p id="share-range-label" class="text-[10px] text-gray-300 text-center"></p>
        </div>
    </div>

    <!-- 核心音频 -->
    <audio id="white-noise" loop preload="auto" playsinline>
        <source src="https://elckemvmphbjjlpzgoqy.supabase.co/storage/v1/object/public/white-sound/raining-clouds.mp3" type="audio/mpeg">
    </audio>
    <audio id="white-noise-2" loop preload="auto" playsinline>
        <source src="https://elckemvmphbjjlpzgoqy.supabase.co/storage/v1/object/public/white-sound/waterfall.mp3" type="audio/mpeg">
    </audio>
    <audio id="white-noise-3" loop preload="auto" playsinline>
        <source src="https://elckemvmphbjjlpzgoqy.supabase.co/storage/v1/object/public/white-sound/thunder.mp3" type="audio/mpeg">
    </audio>
    <audio id="white-noise-4" loop preload="auto" playsinline>
        <source src="https://elckemvmphbjjlpzgoqy.supabase.co/storage/v1/object/public/white-sound/waves.mp3" type="audio/mpeg">
    </audio>

    <!-- Supabase SDK -->
     <script src="https://fastly.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        window.onerror = (msg, src, line) => {
            document.body.insertAdjacentHTML('afterbegin',
                `<div style="background:red;color:white;padding:10px;font-size:12px;position:fixed;top:0;left:0;right:0;z-index:9999">${msg} (line ${line})</div>`
            );
        };
        const state = {
            isFocusing: false,
            startTime: null,
            currentSessionMs: 0,
            sessions: JSON.parse(localStorage.getItem('silent_sessions') || '[]'),
            timerRequest: null
        };

        // ── Supabase 埋点 ──────────────────────────────────────────
        let supabaseClient = null;
        try {
            supabaseClient = window.supabase.createClient(
                'https://bbvghqizsardpusrgxzm.supabase.co',
                'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJidmdocWl6c2FyZHB1c3JneHptIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3ODk2NjEsImV4cCI6MjA4ODM2NTY2MX0.6io59HEeT1kiaG0lpA9YUBtZGArHk-P-ppMNbCh-Zho'
            );
        } catch(e) {}

        let anonId = localStorage.getItem('silent_uid');
        if (!anonId) {
            anonId = typeof crypto.randomUUID === 'function'
                ? crypto.randomUUID()
                : Math.random().toString(36).slice(2) + Date.now().toString(36);
            localStorage.setItem('silent_uid', anonId);
        }

        const isMobile = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);
        const deviceType = isMobile ? 'mobile' : 'desktop';
        const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;

        function getOS() {
            const ua = navigator.userAgent;
            if (/iPhone|iPad|iPod/.test(ua)) return 'iOS';
            if (/Android/.test(ua)) return 'Android';
            if (/Mac/.test(ua)) return 'macOS';
            if (/Windows/.test(ua)) return 'Windows';
            if (/Linux/.test(ua)) return 'Linux';
            return 'unknown';
        }
        const os = getOS();

        async function track(event, payload = {}) {
            if (!supabaseClient) return;
            try {
                await supabaseClient.from('silent_events').insert({
                    anon_id: anonId,
                    event,
                    payload: { ...payload, device: deviceType, os, timezone }
                });
            } catch (e) {
                // 埋点失败不影响主流程
            }
        }

        // 页面加载
        track('page_load');
        // ──────────────────────────────────────────────────────────

        const audios = [
            document.getElementById('white-noise'),
            document.getElementById('white-noise-2'),
            document.getElementById('white-noise-3'),
            document.getElementById('white-noise-4')
        ];
        const audioNames = ['🌧 Rain', '💧 Waterfall', '⛈ Thunder', '🌊 Waves'];
        let currentAudioIdx = 0;
        let isStartingAudio = false;
        let suppressPauseStop = false;
        const AUDIO_START_TIMEOUT_MS = 8000;

        function currentAudio() { return audios[currentAudioIdx]; }

        audios.forEach(a => {
            a.volume = 1;
        });

        function updateNowPlaying() {
            const el = document.getElementById('now-playing');
            const btn = document.getElementById('next-track-btn');
            if (state.isFocusing) {
                el.textContent = `♪ ${audioNames[currentAudioIdx]}`;
                btn.classList.remove('hidden');
            } else {
                el.textContent = '';
                btn.classList.add('hidden');
            }
        }

        document.getElementById('next-track-btn').onclick = () => {
            if (!state.isFocusing || isStartingAudio) return;
            playNextAudio();
        };

        function waitForAudioStart(audio) {
            if (!audio.paused && audio.readyState >= HTMLMediaElement.HAVE_CURRENT_DATA) {
                return Promise.resolve();
            }

            return new Promise((resolve, reject) => {
                let settled = false;
                const cleanup = () => {
                    clearTimeout(timeout);
                    audio.removeEventListener('playing', onPlaying);
                    audio.removeEventListener('timeupdate', onPlaying);
                    audio.removeEventListener('canplay', onCanPlay);
                    audio.removeEventListener('error', onError);
                    audio.removeEventListener('stalled', onError);
                };
                const finish = (fn, value) => {
                    if (settled) return;
                    settled = true;
                    cleanup();
                    fn(value);
                };
                const onPlaying = () => finish(resolve);
                const onCanPlay = () => {
                    if (!audio.paused) finish(resolve);
                };
                const onError = () => finish(reject, new Error('audio failed'));
                const timeout = setTimeout(() => finish(reject, new Error('audio timeout')), AUDIO_START_TIMEOUT_MS);

                audio.addEventListener('playing', onPlaying);
                audio.addEventListener('timeupdate', onPlaying);
                audio.addEventListener('canplay', onCanPlay);
                audio.addEventListener('error', onError);
                audio.addEventListener('stalled', onError);
            });
        }

        async function playAudioFromIndex(startIndex) {
            let lastError = null;
            isStartingAudio = true;
            suppressPauseStop = true;

            for (let attempt = 0; attempt < audios.length; attempt++) {
                currentAudioIdx = (startIndex + attempt) % audios.length;
                audios.forEach((a, idx) => {
                    if (idx === currentAudioIdx) return;
                    a.pause();
                    a.currentTime = 0;
                });

                const audio = currentAudio();
                try {
                    audio.currentTime = 0;
                    audio.load();
                    await audio.play();
                    await waitForAudioStart(audio);
                    updateNowPlaying();
                    return true;
                } catch (error) {
                    lastError = error;
                    audio.pause();
                    audio.currentTime = 0;
                }
            }

            track('audio_start_failed', {
                track: audioNames[currentAudioIdx],
                error: lastError ? String(lastError.message || lastError) : 'unknown'
            });
            return false;
        }

        async function playNextAudio() {
            const nextIndex = (currentAudioIdx + 1) % audios.length;
            const played = await playAudioFromIndex(nextIndex);
            isStartingAudio = false;
            suppressPauseStop = false;
            if (!played && state.isFocusing) stopFocus(true);
        }

        let skippingTrack = false;

        audios.forEach(a => {
            a.addEventListener('ended', () => { if (state.isFocusing) playNextAudio(); });
            a.addEventListener('pause', () => {
                if (state.isFocusing && !a.ended && !skippingTrack && !suppressPauseStop) stopFocus(true);
            });
            a.addEventListener('play', () => { if (!state.isFocusing && !isStartingAudio) a.pause(); });
        });
        const mainBtn = document.getElementById('main-btn');
        const timerDisplay = document.getElementById('timer-display');
        const statusTag = document.getElementById('status-tag');
        const totalDisplay = document.getElementById('total-time');
        const hintText = document.getElementById('hint-text');
        const timelineContainer = document.getElementById('timeline-container');
        const sessionList = document.getElementById('session-list');
        const microProgress = document.getElementById('micro-progress');
        const progressWrapper = document.getElementById('progress-wrapper');

        function formatTimeDetailed(ms) {
            const totalSeconds = Math.floor(ms / 1000);
            const h = Math.floor(totalSeconds / 3600).toString().padStart(2, '0');
            const m = Math.floor((totalSeconds % 3600) / 60).toString().padStart(2, '0');
            const s = (totalSeconds % 60).toString().padStart(2, '0');
            const milliseconds = (ms % 1000).toString().padStart(3, '0');
            return `${h}:${m}:${s}<span class="text-2xl text-blue-500 opacity-60">.${milliseconds}</span>`;
        }

        function formatClock(timestamp) {
            const d = new Date(timestamp);
            return `${d.getHours().toString().padStart(2, '0')}:${d.getMinutes().toString().padStart(2, '0')}`;
        }

        function getTodayHistorySeconds() {
            const today = new Date().toDateString();
            return splitByDay(state.sessions)
                .filter(s => new Date(s.start).toDateString() === today)
                .reduce((acc, s) => acc + s.duration, 0);
        }

        function updateTotalDisplay(extraMs) {
            // 只取当前 session 中属于今天的部分（处理跨日专注）
            const todayStart = new Date();
            todayStart.setHours(0, 0, 0, 0);
            const sessionStart = state.startTime || Date.now();
            const todayPortionMs = sessionStart < todayStart.getTime()
                ? Date.now() - todayStart.getTime()   // session 跨日，只算今天 00:00 至今
                : extraMs;                             // session 在今天内，全部计入

            const totalSeconds = getTodayHistorySeconds() + Math.floor(todayPortionMs / 1000);
            const h = Math.floor(totalSeconds / 3600);
            const m = Math.floor((totalSeconds % 3600) / 60);
            const s = totalSeconds % 60;
            const mm = m.toString().padStart(2, '0');
            const ss = s.toString().padStart(2, '0');
            totalDisplay.textContent = h > 0
                ? `${h}:${mm}:${ss}`
                : `${m}:${ss}`;
        }

        function updateLoop() {
            if (!state.isFocusing) return;
            
            state.currentSessionMs = Date.now() - state.startTime;
            timerDisplay.innerHTML = formatTimeDetailed(state.currentSessionMs);
            
            // 进度条计算
            const progress = ((state.currentSessionMs % 60000) / 60000) * 100;
            // 直接赋值宽度，不经过 CSS transition，从而实现无感 reset
            microProgress.style.width = `${progress}%`;

            // 实时更新今日累计
            updateTotalDisplay(state.currentSessionMs);

            if (state.currentSessionMs < 5000) {
                hintText.textContent = "保持绝对静止，深度进入...";
            } else {
                const totalMins = Math.floor(state.currentSessionMs / 60000);
                hintText.textContent = totalMins > 0 ? `已守护纯净专注 ${totalMins} 分钟` : "这是你应得的宁静";
            }

            state.timerRequest = requestAnimationFrame(updateLoop);
        }

        function saveSession() {
            if (state.currentSessionMs > 1000) {
                state.sessions.push({
                    start: state.startTime,
                    end: Date.now(),
                    duration: Math.floor(state.currentSessionMs / 1000)
                });
                localStorage.setItem('silent_sessions', JSON.stringify(state.sessions));
                renderStats();
            }
        }

        async function startFocus() {
            if (isStartingAudio) return;

            isStartingAudio = true;
            mainBtn.disabled = true;
            mainBtn.textContent = "正在启动声音...";
            hintText.textContent = "正在连接白噪音";

            const startIndex = currentAudioIdx;
            const audioStarted = await playAudioFromIndex(startIndex);
            isStartingAudio = false;
            suppressPauseStop = false;

            if (!audioStarted) {
                mainBtn.disabled = false;
                mainBtn.textContent = "开始专注";
                hintText.textContent = "声音启动失败，请检查网络或稍后重试";
                statusTag.textContent = "声音未启动";
                statusTag.className = "inline-block px-3 py-1 rounded-full text-xs font-semibold bg-orange-100 text-orange-600 mb-8 uppercase tracking-widest";
                return;
            }

            state.isFocusing = true;
            state.startTime = Date.now();
            state.currentSessionMs = 0;
            updateNowPlaying();

            track('focus_start', { start_time: state.startTime });

            document.body.classList.add('is-focusing');
            progressWrapper.classList.replace('opacity-0', 'opacity-100');
            
            statusTag.textContent = "深度专注中";
            statusTag.className = "inline-block px-3 py-1 rounded-full text-xs font-semibold bg-blue-500 text-white mb-6 uppercase tracking-widest shadow-md";
            
            mainBtn.disabled = false;
            mainBtn.textContent = "结束本次专注";
            mainBtn.className = "w-full py-5 rounded-2xl bg-gray-100 text-gray-400 font-bold text-xl active:scale-95 transition-transform";

            state.timerRequest = requestAnimationFrame(updateLoop);
        }

        function stopFocus(wasInterrupted = false) {
            if (!state.isFocusing) return;

            state.currentSessionMs = Date.now() - state.startTime;
            state.isFocusing = false;
            cancelAnimationFrame(state.timerRequest);
            saveSession();

            track(wasInterrupted ? 'focus_interrupted' : 'focus_end', {
                duration_ms: state.currentSessionMs,
                start_time: state.startTime
            });

            audios.forEach(a => { a.pause(); a.currentTime = 0; });
            currentAudioIdx = 0;
            updateNowPlaying();
            
            progressWrapper.classList.replace('opacity-100', 'opacity-0');
            microProgress.style.width = '0';

            document.body.classList.remove('is-focusing');
            
            if (wasInterrupted) {
                statusTag.textContent = "检测到干扰！";
                statusTag.className = "inline-block px-3 py-1 rounded-full text-xs font-semibold bg-orange-100 text-orange-600 mb-6 uppercase tracking-widest";
                hintText.textContent = "声音被抢占，专注已强制停止";
            } else {
                statusTag.textContent = "专注已保存";
                statusTag.className = "inline-block px-3 py-1 rounded-full text-xs font-semibold bg-gray-100 text-gray-500 mb-6 uppercase tracking-widest";
                hintText.textContent = "准备好开始下一段纯净时间了吗？";
            }

            mainBtn.textContent = "再次开始";
            mainBtn.className = "w-full py-5 rounded-2xl bg-black text-white font-bold text-xl shadow-lg active:scale-95 transition-transform";
        }

        // 将跨日 session 按自然日拆分成多条
        function splitByDay(sessions) {
            const result = [];
            for (const s of sessions) {
                let cursor = s.start;
                const end = s.end;
                while (cursor < end) {
                    // 当天午夜
                    const midnight = new Date(cursor);
                    midnight.setHours(24, 0, 0, 0);
                    const segEnd = Math.min(midnight.getTime(), end);
                    result.push({
                        start: cursor,
                        end: segEnd,
                        duration: Math.floor((segEnd - cursor) / 1000)
                    });
                    cursor = segEnd;
                }
            }
            return result;
        }

        function renderStats() {
            const today = new Date().toDateString();
            const todaySessions = splitByDay(state.sessions)
                .filter(s => new Date(s.start).toDateString() === today)
                .sort((a, b) => b.start - a.start);
            
            const totalSeconds = todaySessions.reduce((acc, s) => acc + s.duration, 0);
            const h = Math.floor(totalSeconds / 3600);
            const m = Math.floor((totalSeconds % 3600) / 60);
            const s = totalSeconds % 60;
            const mm = m.toString().padStart(2, '0');
            const ss = s.toString().padStart(2, '0');
            totalDisplay.textContent = h > 0
                ? `${h}:${mm}:${ss}`
                : `${m}:${ss}`;

            timelineContainer.innerHTML = '';
            todaySessions.forEach(s => {
                const dayStart = new Date(s.start).setHours(0,0,0,0);
                const startPos = ((s.start - dayStart) / (24 * 3600 * 1000)) * 100;
                const width = (s.duration / (24 * 3600)) * 100;
                const block = document.createElement('div');
                block.className = 'timeline-block';
                block.style.left = `${startPos}%`;
                block.style.width = `${Math.max(width, 0.5)}%`;
                timelineContainer.appendChild(block);
            });

            if (todaySessions.length === 0) {
                sessionList.innerHTML = '<p class="text-xs text-gray-400 text-center py-4">今天还没有记录</p>';
            } else {
                sessionList.innerHTML = todaySessions.map(s => `
                    <div class="flex justify-between items-center bg-gray-50 rounded-xl px-4 py-3 border border-gray-100">
                        <div class="flex items-center gap-3">
                            <span class="text-sm text-gray-400">—</span>
                            <div>
                                <p class="text-[9px] font-bold text-gray-400 uppercase mb-0.5">${formatClock(s.start)} — ${formatClock(s.end)}</p>
                                <p class="text-xs font-bold text-gray-700">专注时段</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="text-xs font-bold text-blue-600">${Math.floor(s.duration / 60)}m ${s.duration % 60}s</p>
                        </div>
                    </div>
                `).join('');
            }
        }

        mainBtn.onclick = () => { !state.isFocusing ? startFocus() : stopFocus(false); };

        window.addEventListener('beforeunload', () => {
            if (state.isFocusing) {
                state.currentSessionMs = Date.now() - state.startTime;
                saveSession();
            }
        });

        // ── 分享弹窗 ──────────────────────────────────────────────
        const shareModal   = document.getElementById('share-modal');
        const shareOverlay = document.getElementById('share-overlay');
        const shareClose   = document.getElementById('share-close');

        function formatMinSec(totalSeconds) {
            const h = Math.floor(totalSeconds / 3600);
            const m = Math.floor((totalSeconds % 3600) / 60);
            const s = totalSeconds % 60;
            if (h > 0) return `${h}h ${m.toString().padStart(2,'0')}m`;
            if (m > 0) return `${m}m ${s.toString().padStart(2,'0')}s`;
            return `${s}s`;
        }

        function drawPie(canvas, focusSec, noiseSec) {
            const ctx = canvas.getContext('2d');
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const r  = Math.min(cx, cy) - 10;
            const total = focusSec + noiseSec;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (total === 0) {
                ctx.beginPath();
                ctx.arc(cx, cy, r, 0, Math.PI * 2);
                ctx.fillStyle = '#f3f4f6';
                ctx.fill();
                ctx.fillStyle = '#9ca3af';
                ctx.font = 'bold 13px Inter, sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('暂无数据', cx, cy);
                return;
            }

            const focusAngle = (focusSec / total) * Math.PI * 2;
            const noiseAngle = Math.PI * 2 - focusAngle;
            const startAngle = -Math.PI / 2;

            if (focusSec > 0) {
                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.arc(cx, cy, r, startAngle, startAngle + focusAngle);
                ctx.closePath();
                ctx.fillStyle = '#3b82f6';
                ctx.fill();
            }

            if (noiseSec > 0) {
                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.arc(cx, cy, r, startAngle + focusAngle, startAngle + focusAngle + noiseAngle);
                ctx.closePath();
                ctx.fillStyle = '#fdba74';
                ctx.fill();
            }

            // 中心白圆（甜甜圈效果）
            ctx.beginPath();
            ctx.arc(cx, cy, r * 0.55, 0, Math.PI * 2);
            ctx.fillStyle = '#ffffff';
            ctx.fill();

            // 中心专注率
            const pct = Math.round((focusSec / total) * 100);
            ctx.fillStyle = '#1f2937';
            ctx.font = `bold ${Math.round(r * 0.28)}px JetBrains Mono, monospace`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(`${pct}%`, cx, cy - r * 0.06);
            ctx.font = `${Math.round(r * 0.14)}px Inter, sans-serif`;
            ctx.fillStyle = '#9ca3af';
            ctx.fillText('静谧率', cx, cy + r * 0.18);
        }

        function openShareModal() {
            const now = Date.now();
            const today8am = new Date();
            today8am.setHours(8, 0, 0, 0);
            const rangeStart = today8am.getTime();

            if (now < rangeStart) {
                alert('还没到 08:00，暂无数据哦 🌙');
                return;
            }

            const totalRangeSec = Math.floor((now - rangeStart) / 1000);

            // 含正在进行的 session
            let allSessions = [...state.sessions];
            if (state.isFocusing) {
                allSessions.push({ start: state.startTime, end: now, duration: Math.floor((now - state.startTime) / 1000) });
            }

            // 只取 08:00 之后的专注秒数
            const focusSec = splitByDay(allSessions).reduce((acc, s) => {
                const segStart = Math.max(s.start, rangeStart);
                const segEnd   = Math.min(s.end, now);
                return segEnd > segStart ? acc + Math.floor((segEnd - segStart) / 1000) : acc;
            }, 0);

            const noiseSec = Math.max(0, totalRangeSec - focusSec);

            document.getElementById('share-focus-time').textContent = formatMinSec(focusSec);
            document.getElementById('share-noise-time').textContent = formatMinSec(noiseSec);

            const nowDate = new Date();
            // document.getElementById('share-date-label').textContent =
            //     `${nowDate.getFullYear()}.${(nowDate.getMonth()+1).toString().padStart(2,'0')}.${nowDate.getDate().toString().padStart(2,'0')}`;

            const nowTimeStr = `${nowDate.getHours().toString().padStart(2,'0')}:${nowDate.getMinutes().toString().padStart(2,'0')}`;
            document.getElementById('share-range-label').textContent = `统计范围：08:00 — ${nowTimeStr}`;

            drawPie(document.getElementById('share-pie'), focusSec, noiseSec);
            shareModal.classList.remove('hidden');
        }

        document.getElementById('share-btn').onclick = openShareModal;
        shareClose.onclick   = () => shareModal.classList.add('hidden');
        shareOverlay.onclick = () => shareModal.classList.add('hidden');
        // ──────────────────────────────────────────────────────────

        renderStats();
    </script>
</body>
</html>
