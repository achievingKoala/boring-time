<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SilentStats - 专注力监控器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body {
            font-family: 'JetBrains+Mono', monospace;
            background-color: #0a0a0a;
            color: #e5e5e5;
        }
        .timer-glow {
            text-shadow: 0 0 20px rgba(34, 197, 94, 0.5);
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <!-- 顶部状态栏 -->
    <div class="fixed top-0 w-full p-6 flex justify-between items-center bg-zinc-900/50 backdrop-blur-md border-b border-zinc-800">
        <h1 class="font-bold text-xl tracking-tighter">SILENT<span class="text-green-500">STATS</span></h1>
        <div class="text-sm text-zinc-400 text-right">
            历史总计: <span id="total-accumulated">0</span> 分钟
        </div>
    </div>

    <!-- 主交互区 -->
    <main class="w-full max-w-md text-center space-y-8">

        <div id="status-tag" class="inline-block px-3 py-1 rounded-full bg-zinc-800 text-xs font-bold uppercase tracking-widest text-zinc-500">
            等待开始
        </div>

        <!-- 计时器 -->
        <div class="py-12">
            <div id="main-timer" class="text-7xl font-bold timer-glow transition-all duration-500">00:00:00</div>
            <p class="text-zinc-500 mt-4 text-sm px-8">点击开始后，请锁屏或切换到其他 App。回到页面后自动结算。</p>
        </div>

        <!-- 操作按钮 -->
        <div class="flex flex-col gap-4">
            <button id="start-btn" class="w-full py-4 bg-green-600 hover:bg-green-500 text-black font-bold rounded-xl transition-all transform active:scale-95 shadow-lg">
                开始挑战 (START)
            </button>
        </div>

        <!-- 本次结算结果 -->
        <div id="result-area" class="hidden mt-4 p-6 border border-zinc-700 rounded-2xl bg-zinc-900/30 text-left space-y-4">
            <div>
                <p class="text-xs text-zinc-500 mb-1">本次总时长</p>
                <p id="result-total" class="text-3xl font-bold text-green-400">0 秒</p>
            </div>
            <div>
                <p class="text-xs text-zinc-500 mb-1">其中被打断时长</p>
                <p id="result-interrupted" class="text-xl font-bold text-yellow-400">0 秒</p>
            </div>
            <div>
                <p class="text-xs text-zinc-500 mb-1">纯净专注时长</p>
                <p id="result-clean" class="text-xl font-bold text-green-300">0 秒</p>
            </div>
        </div>
    </main>

    <audio id="silent-audio" loop></audio>

    <script>
        // 生成 440Hz 有声 WAV（测试用，改回静音把正弦波那行删掉即可）
        function createAudioSrc(durationSeconds = 30) {
            const sampleRate = 44100;
            const numSamples = sampleRate * durationSeconds;
            const buffer = new ArrayBuffer(44 + numSamples * 2);
            const view = new DataView(buffer);
            const writeStr = (offset, str) => { for (let i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i)); };
            writeStr(0, 'RIFF');
            view.setUint32(4, 36 + numSamples * 2, true);
            writeStr(8, 'WAVE');
            writeStr(12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, 1, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            writeStr(36, 'data');
            view.setUint32(40, numSamples * 2, true);
            for (let i = 0; i < numSamples; i++) {
                const sample = Math.sin(2 * Math.PI * 440 * i / sampleRate) * 0.2 * 32767;
                view.setInt16(44 + i * 2, sample, true);
            }
            const blob = new Blob([buffer], { type: 'audio/wav' });
            return URL.createObjectURL(blob);
        }

        const audio = document.getElementById('silent-audio');
        audio.src = createAudioSrc(30);

        // 状态
        let isRunning = false;
        let sessionStartTime = 0;       // 本次挑战开始时间戳
        let lastActiveTime = 0;         // 上次页面可见时间戳
        let interruptedMs = 0;          // 本次累计被打断毫秒数
        let interruptStartTime = 0;     // 当前这次打断的开始时间戳
        let isInterrupted = false;      // 当前是否处于打断状态
        let lifetimeMinutes = parseFloat(localStorage.getItem('silentStats_total')) || 0;

        const timerDisplay = document.getElementById('main-timer');
        const startBtn = document.getElementById('start-btn');
        const statusTag = document.getElementById('status-tag');
        const totalDisplay = document.getElementById('total-accumulated');
        const resultArea = document.getElementById('result-area');

        totalDisplay.innerText = Math.floor(lifetimeMinutes);

        // 音频被抢占 → 记录打断开始，尝试抢回
        audio.onpause = () => {
            if (!isRunning) return;
            if (!isInterrupted) {
                isInterrupted = true;
                interruptStartTime = Date.now();
                statusTag.innerText = "检测到干扰";
                statusTag.className = "inline-block px-3 py-1 rounded-full bg-zinc-800 text-xs font-bold uppercase tracking-widest text-yellow-400 animate-pulse";
                console.log("Interrupted at", interruptStartTime);
            }

        };

        // 音频恢复播放 → 打断结束
        audio.onplay = () => {
            if (!isRunning) return;
            if (isInterrupted) {
                isInterrupted = false;
                interruptedMs += Date.now() - interruptStartTime;
                statusTag.innerText = "静默探测中";
                statusTag.className = "inline-block px-3 py-1 rounded-full bg-zinc-800 text-xs font-bold uppercase tracking-widest text-green-500 animate-pulse";
                console.log("Resumed, total interrupted:", interruptedMs, "ms");
            }
        };

        // 回到页面 → 自动结算
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible' && isRunning) {
                // 补算锁屏期间时间
                const now = Date.now();
                lastActiveTime = now;
                updateUI();
                settle();
            }
        });

        function startChallenge() {
            isRunning = true;
            isInterrupted = false;
            interruptedMs = 0;
            interruptStartTime = 0;
            sessionStartTime = Date.now();
            lastActiveTime = sessionStartTime;

            audio.play().catch(e => console.error("Audio play blocked", e));

            startBtn.classList.add('hidden');
            resultArea.classList.add('hidden');
            statusTag.innerText = "静默探测中";
            statusTag.className = "inline-block px-3 py-1 rounded-full bg-zinc-800 text-xs font-bold uppercase tracking-widest text-green-500 animate-pulse";

            tick();
        }

        function settle() {
            if (!isRunning) return;
            isRunning = false;
            audio.pause();

            // 如果结算时仍处于打断状态，把这段也算进去
            if (isInterrupted) {
                interruptedMs += Date.now() - interruptStartTime;
                isInterrupted = false;
            }

            const totalMs = Date.now() - sessionStartTime;
            const totalSec = Math.floor(totalMs / 1000);
            const interruptSec = Math.floor(interruptedMs / 1000);
            const cleanSec = Math.max(0, totalSec - interruptSec);

            // 只把纯净时间计入历史
            lifetimeMinutes += cleanSec / 60;
            localStorage.setItem('silentStats_total', lifetimeMinutes);
            totalDisplay.innerText = Math.floor(lifetimeMinutes);

            document.getElementById('result-total').innerText = formatSec(totalSec);
            document.getElementById('result-interrupted').innerText = formatSec(interruptSec);
            document.getElementById('result-clean').innerText = formatSec(cleanSec);
            resultArea.classList.remove('hidden');

            resetUI();
        }

        function resetUI() {
            startBtn.classList.remove('hidden');
            statusTag.innerText = "等待开始";
            statusTag.className = "inline-block px-3 py-1 rounded-full bg-zinc-800 text-xs font-bold uppercase tracking-widest text-zinc-500";
            timerDisplay.innerText = "00:00:00";
        }

        function updateUI() {
            const elapsed = Math.floor((Date.now() - sessionStartTime) / 1000);
            const h = Math.floor(elapsed / 3600).toString().padStart(2, '0');
            const m = Math.floor((elapsed % 3600) / 60).toString().padStart(2, '0');
            const s = (elapsed % 60).toString().padStart(2, '0');
            timerDisplay.innerText = `${h}:${m}:${s}`;
        }

        function tick() {
            if (!isRunning) return;
            updateUI();
            setTimeout(tick, 1000);
        }

        function formatSec(sec) {
            const h = Math.floor(sec / 3600);
            const m = Math.floor((sec % 3600) / 60);
            const s = sec % 60;
            let str = '';
            if (h > 0) str += `${h} 小时 `;
            if (m > 0) str += `${m} 分钟 `;
            str += `${s} 秒`;
            return str;
        }

        startBtn.onclick = startChallenge;
    </script>
</body>
</html>
